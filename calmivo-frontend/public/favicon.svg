<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" rx="20" fill="#0F0B1A"/>
  <defs>
    <linearGradient id="g" x1="5" y1="5" x2="95" y2="95" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF47C4"/>
      <stop offset="100%" stop-color="#C026D3"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Speech bubble outline -->
  <path d="M16 10 Q8 10 8 18 L8 60 Q8 68 16 68 L20 68 L13 84 L34 68 L84 68 Q92 68 92 60 L92 18 Q92 10 84 10 Z"
