    filter="url(#glow)"/>
  <!-- Heart left bump -->
  <path d="M50 28 C46 19 20 20 20 38 C20 53 35 60 50 67"
    stroke="url(#g)" stroke-width="5" stroke-linecap="round" fill="none" filter="url(#glow)"/>
  <!-- Heart right bump -->
  <path d="M50 28 C54 19 80 20 80 38 C80 53 65 60 50 67"
    stroke="url(#g)" stroke-width="5" stroke-linecap="round" fill="none" filter="url(#glow)"/>
</svg>
